# DeerFlow — Deploy with Pre-Built Images
#
# Quick start:
#   1. Copy config files:
#        cp config.example.yaml config.yaml
#        cp extensions_config.example.json extensions_config.json
#        cp .env.example .env
#        cp frontend/.env.example frontend/.env
#   2. Edit config.yaml  — configure at least one model and its API key
#   3. Edit .env          — set API keys (OPENAI_API_KEY, TAVILY_API_KEY, etc.)
#   4. docker compose up -d
#
# Access: http://localhost:${PORT:-2026}
#
# Override the image tag via DEER_FLOW_VERSION (default: latest):
#   DEER_FLOW_VERSION=v1.0.0 docker compose up -d
#
# Environment variables (all have sensible defaults):
#   PORT                             — host port (default: 2026)
#   DEER_FLOW_VERSION                — image tag (default: latest)
#   IMAGE_REGISTRY                   — image registry prefix (default: ghcr.io/fjiayang)
#   BETTER_AUTH_SECRET               — frontend auth secret (default: auto-generated)
#   DEER_FLOW_DOCKER_SOCKET          — Docker socket path (default: /var/run/docker.sock)

x-backend-image: &backend-image
  image: ${IMAGE_REGISTRY:-ghcr.io/fjiayang}/deer-flow-backend:${DEER_FLOW_VERSION:-latest}

x-backend-volumes: &backend-volumes
  - ./config.yaml:/app/backend/config.yaml:ro
  - ./extensions_config.json:/app/backend/extensions_config.json:ro
  - ./skills:/app/skills:ro
  - deer-flow-data:/app/backend/.deer-flow
  - ${DEER_FLOW_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

x-backend-env: &backend-env
  CI: "true"
  DEER_FLOW_HOME: /app/backend/.deer-flow
  DEER_FLOW_SANDBOX_HOST: host.docker.internal

services:
  # ── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - deer-flow
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/fjiayang}/deer-flow-frontend:${DEER_FLOW_VERSION:-latest}
    container_name: deer-flow-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-deer-flow-secret-change-me}
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
      - DEER_FLOW_INTERNAL_LANGGRAPH_BASE_URL=http://langgraph:2024
    env_file:
      - frontend/.env
    networks:
      - deer-flow
    restart: unless-stopped

  # ── Gateway API ──────────────────────────────────────────────────────────────
  gateway:
    <<: *backend-image
    container_name: deer-flow-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run --no-sync uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes: *backend-volumes
    working_dir: /app
    environment:
      <<: *backend-env
      DEER_FLOW_CHANNELS_LANGGRAPH_URL: http://langgraph:2024
      DEER_FLOW_CHANNELS_GATEWAY_URL: http://gateway:8001
      DEER_FLOW_HOST_BASE_DIR: /app/backend/.deer-flow
      DEER_FLOW_HOST_SKILLS_PATH: /app/skills
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

  # ── LangGraph Server ────────────────────────────────────────────────────────
  langgraph:
    <<: *backend-image
    container_name: deer-flow-langgraph
    command: sh -c "cd /app/backend && uv run --no-sync langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024 --n-jobs-per-worker 10"
    volumes:
      - ./config.yaml:/app/backend/config.yaml:ro
      - ./extensions_config.json:/app/backend/extensions_config.json:ro
      - ./skills:/app/skills:ro
      - deer-flow-data:/app/backend/.deer-flow
      - langgraph-api:/app/backend/.langgraph_api
      - ${DEER_FLOW_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    working_dir: /app
    environment:
      <<: *backend-env
      DEER_FLOW_CONFIG_PATH: /app/backend/config.yaml
      DEER_FLOW_EXTENSIONS_CONFIG_PATH: /app/backend/extensions_config.json
      DEER_FLOW_HOST_BASE_DIR: /app/backend/.deer-flow
      DEER_FLOW_HOST_SKILLS_PATH: /app/skills
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

  # ── Provisioner (optional, Kubernetes sandbox mode) ──────────────────────────
  provisioner:
    profiles:
      - provisioner
    image: ${IMAGE_REGISTRY:-ghcr.io/fjiayang}/deer-flow-provisioner:${DEER_FLOW_VERSION:-latest}
    container_name: deer-flow-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=deer-flow
      - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  deer-flow-data:
  langgraph-api:

networks:
  deer-flow:
    driver: bridge
